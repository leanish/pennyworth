name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run check --workspaces --if-present
      - run: npm run synth --workspace infra

  integration:
    runs-on: ubuntu-latest
    services:
      # Keep image tag + SERVICES in sync with the root docker-compose.yml.
      localstack:
        image: localstack/localstack:4.14.0
        ports:
          - 4566:4566
        env:
          SERVICES: dynamodb,sqs,events,s3,ssm,scheduler
          EAGER_SERVICE_LOADING: "1"
          DEBUG: "0"
          LS_LOG: warn
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run build --workspaces --if-present
      - run: npm run test:integration --workspaces --if-present
