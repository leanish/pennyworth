identifier: secureit
compute: lambda

triggers:
  - type: scheduler
    queueArnRef: secureit-requests
    dlqArnRef: secureit-requests-dlq
    # scheduled tick fires stage=init; runtime.publish fires stage=breakdown (sourceTrigger=self);
    # publishDelayed fires stage=revisit (sourceTrigger=self); phase-3+ gh-webhook also fires stage=revisit

stages: [init, breakdown, revisit]

codingAgent: claude-code
model: claude-sonnet-4-6

skills:
  entrypoints:
    - secureit          # invoked from the breakdown handler — scans GH alerts, opens draft PRs
    - secureit-revisit  # invoked from the revisit handler — decides flip / adapt / rollback / defer
  support:
    - karpathy-guidelines
    - diagnose

needs:
  - github
