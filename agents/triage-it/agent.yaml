identifier: triage-it
compute: lambda

triggers:
  - type: consumer
    queueArnRef: triage-it-requests
    dlqArnRef: triage-it-requests-dlq
    signedEnvelope: true

stages: [init]

codingAgent: claude-code
model: claude-sonnet-4-6

skills:
  entrypoints:
    - triage
  support:
    - karpathy-guidelines

needs:
  - s3                # Evidence-archive fetch (the collector's tar.gz blob)
  - sqs               # AWS-mode terminal reply delivery to envelope.replyTo
  - eventbridge       # triage-it emits its own lifecycle events (consumer contract)
