identifier: secure-it
compute: lambda

triggers:
  - type: scheduler
    queueArnRef: secure-it-requests
    dlqArnRef: secure-it-requests-dlq
    # The recurring tick fires stage=init (sourceTrigger=scheduler);
    # runtime.publish fires stage=breakdown (sourceTrigger=self);
    # runtime.publishDelayed fires stage=revisit (sourceTrigger=self).

stages: [init, breakdown, revisit]

codingAgent: claude-code
model: claude-sonnet-4-6

skills:
  entrypoints:
    - secure-it          # invoked from the breakdown handler — scans GH alerts, opens draft PRs
    - secure-it-revisit  # invoked from the revisit handler — decides flip / adapt / rollback / defer
  support:
    - karpathy-guidelines

needs:
  - github
